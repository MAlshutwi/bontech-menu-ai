services:
  - type: web
    name: bontech-menu-ai-v2
    runtime: docker
    plan: free
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONUTF8
        value: "1"
      - key: BONTECH_MODEL_FILE
        value: /app/ToCoun/Final/bontech_recommendation_model_v1_1_0.joblib
      - key: BONTECH_MODEL_SHA256
        value: 061aa95de23e5fb50529bcde3a2f0ded818294cae57a4cf2fd99ae72e9e82cc4
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: PGSSLMODE
        value: require
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: API_KEY
        sync: false
