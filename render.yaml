services:
  - type: web
    name: bontech-menu-ai
    runtime: docker
    plan: free
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONUTF8
        value: "1"
      - key: BONTECH_MODEL_FILE
        value: /app/ToCoun/Final/bontech_recommendation_model_v1_1_0.joblib
      - key: BONTECH_MODEL_SHA256
        value: 6b86348e70d5889eb79def8f115878763f0168bd9cc1bc8e797755ad20c320e5
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: PGSSLMODE
        value: require
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: API_KEY
        sync: false
